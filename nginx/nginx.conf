worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # TLS is expected to terminate here in production, with a real
    # certificate mounted and a `listen 443 ssl;` server block added. This
    # dev config terminates plaintext on :80 for local Docker Compose use.
    server {
        listen 80;
        server_name _;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /api/ {
            proxy_pass http://api:8001/api/;
        }

        location / {
            proxy_pass http://web:8002/;
        }
    }
}
