{% extends "shared/base.html" %}
{% block title %}New organization — deepvac Licensing{% endblock %}
{% block content %}
<div class="card narrow">
    <h1>New organization</h1>
    <form method="post">
        {{ form.hidden_tag() }}
        <label>Name
            {{ form.name(autofocus=true) }}
            {% for e in form.name.errors %}<span class="field-error">{{ e }}</span>{% endfor %}
        </label>
        <label>Slug
            {{ form.slug() }}
            {% for e in form.slug.errors %}<span class="field-error">{{ e }}</span>{% endfor %}
        </label>
        <button type="submit" class="btn btn-primary">Create organization</button>
    </form>
</div>
{% endblock %}
