{% extends "shared/base.html" %}
{% block title %}Change password — deepvac Licensing{% endblock %}
{% block content %}
<div class="card narrow">
    <h1>Change password</h1>
    <form method="post">
        {{ form.hidden_tag() }}
        <label>Current password
            {{ form.current_password(autofocus=true) }}
            {% for e in form.current_password.errors %}<span class="field-error">{{ e }}</span>{% endfor %}
        </label>
        <label>New password
            {{ form.new_password() }}
            {% for e in form.new_password.errors %}<span class="field-error">{{ e }}</span>{% endfor %}
        </label>
        <label>Confirm new password
            {{ form.confirm_password() }}
            {% for e in form.confirm_password.errors %}<span class="field-error">{{ e }}</span>{% endfor %}
        </label>
        <button type="submit" class="primary">Update password</button>
    </form>
</div>
{% endblock %}
