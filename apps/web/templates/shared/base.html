<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}deepvac Licensing{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
    <header class="topbar">
        <span class="brand">deepvac &middot; Licensing Portal</span>
        {% if current_user %}
        <span class="muted">{{ current_user.display_name }}</span>
        <form method="post" action="{{ url_for('auth.logout') }}" class="logout-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="link-button">Sign out</button>
        </form>
        {% endif %}
    </header>
    <main class="page">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
